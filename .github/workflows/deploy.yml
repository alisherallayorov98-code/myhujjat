name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # Avval CI ishlaydi (test + tsc + build). Muvaffaqiyatsiz bo'lsa,
  # deploy ham bo'lmaydi — buzuq kod prodga chiqmaydi.
  test:
    name: CI (test + tsc + build)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Prisma generate (backend only)
        if: matrix.project == 'backend'
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Backend tests (jest)
        if: matrix.project == 'backend'
        run: npm test -- --ci --passWithNoTests
        env:
          DATABASE_URL:   "postgresql://test:test@localhost:5432/test"
          JWT_SECRET:     "test_secret_key_at_least_32_characters_long"
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Frontend tests (vitest)
        if: matrix.project == 'frontend'
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          PROJECT_PATH: ${{ secrets.PROJECT_PATH || '/home/alisher/myhujjat.uz' }}
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          envs:     PROJECT_PATH
          script: |
            set -e
            cd "$PROJECT_PATH"

            git pull origin main

            # Frontend + backend rebuild (yangi kod, i18n messages, migration'lar)
            # docker-compose.override.yml — port mappings (3100, 4100) Caddy o'rniga
            COMPOSE="docker compose -f docker-compose.prod.yml"
            [ -f docker-compose.override.yml ] && COMPOSE="$COMPOSE -f docker-compose.override.yml"

            $COMPOSE build frontend backend

            # Atomic switch — eski tushadi, yangi ko'tariladi
            $COMPOSE up -d frontend backend

            # Backend startup + DB ready uchun kutish
            sleep 10

            # Migration deploy (yangi migration'lar bo'lsa)
            $COMPOSE exec -T backend npx prisma migrate deploy || true

            # Eski image'larni tozalash
            docker system prune -f
