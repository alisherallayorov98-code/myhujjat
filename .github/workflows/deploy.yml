name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # Avval CI ishlaydi (test + tsc + build). Muvaffaqiyatsiz bo'lsa,
  # deploy ham bo'lmaydi — buzuq kod prodga chiqmaydi.
  test:
    name: CI (test + tsc + build)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Prisma generate (backend only)
        if: matrix.project == 'backend'
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests (backend only)
        if: matrix.project == 'backend'
        run: npm test -- --ci --passWithNoTests
        env:
          DATABASE_URL:   "postgresql://test:test@localhost:5432/test"
          JWT_SECRET:     "test_secret_key_at_least_32_characters_long"
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/myhujjat
            git pull origin main
            docker compose -f docker-compose.prod.yml build backend
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec backend npx prisma migrate deploy
            docker system prune -f
