# Test postgres — integration testlar uchun
# Ishga tushirish:
#   docker compose -f docker-compose.test.yml up -d
#   DATABASE_URL=postgresql://test:test@localhost:5433/myhujjat_test \
#     npx prisma migrate deploy
#   DATABASE_URL=postgresql://test:test@localhost:5433/myhujjat_test \
#     npm run test:integration
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: myhujjat-postgres-test
    environment:
      POSTGRES_USER:     test
      POSTGRES_PASSWORD: test
      POSTGRES_DB:       myhujjat_test
    ports:
      - "5433:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout:  5s
      retries:  10
    tmpfs:
      - /var/lib/postgresql/data  # Tezkor — disk emas, RAM
