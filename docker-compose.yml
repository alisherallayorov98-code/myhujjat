version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: myhujjat_postgres
    environment:
      POSTGRES_DB:       myhujjat
      POSTGRES_USER:     myhujjat_user
      POSTGRES_PASSWORD: myhujjat_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: myhujjat_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
