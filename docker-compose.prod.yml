services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       myhujjat
      POSTGRES_USER:     myhujjat
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myhujjat_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myhujjat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - myhujjat_net

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myhujjat_net

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    env_file: ./frontend/.env.prod
    depends_on:
      - backend
    networks:
      - myhujjat_net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 uchun
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - myhujjat_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  myhujjat_net:
    driver: bridge
